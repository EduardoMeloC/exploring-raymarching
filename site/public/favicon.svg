<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Iridescent fill: violet → teal → pink bands like the shader's cos-phase output -->
    <radialGradient id="iri" cx="45%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#b8aaff" stop-opacity="0.08"/>
      <stop offset="35%"  stop-color="#7c6aff" stop-opacity="0.22"/>
      <stop offset="58%"  stop-color="#5bc8d8" stop-opacity="0.30"/>
      <stop offset="78%"  stop-color="#c47aff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#7c6aff" stop-opacity="0.50"/>
    </radialGradient>
    <!-- Soft specular highlight -->
    <radialGradient id="spec" cx="37%" cy="30%" r="28%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00"/>
    </radialGradient>
    <!-- Faint secondary shimmer bottom-right -->
    <radialGradient id="shimmer" cx="65%" cy="68%" r="22%">
      <stop offset="0%"   stop-color="#5bc8d8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#5bc8d8" stop-opacity="0.00"/>
    </radialGradient>
  </defs>

  <circle cx="64" cy="64" r="56" fill="url(#iri)"/>
  <circle cx="64" cy="64" r="56" fill="url(#spec)"/>
  <circle cx="64" cy="64" r="56" fill="url(#shimmer)"/>
  <!-- Thin, soft rim -->
  <circle cx="64" cy="64" r="55.5" fill="none" stroke="url(#iri)" stroke-width="3" stroke-opacity="0.55"/>
</svg>
